<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15395c"/>
      <stop offset="1" stop-color="#06192e"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1fd17e"/>
      <stop offset="1" stop-color="#0e7a47"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- pitch markings -->
  <g stroke="#16b86b" stroke-width="10" fill="none" opacity="0.55">
    <!-- outer pitch box -->
    <rect x="96" y="96" width="320" height="320" rx="20"/>
    <!-- halfway line -->
    <line x1="96" y1="256" x2="416" y2="256"/>
    <!-- centre circle -->
    <circle cx="256" cy="256" r="66"/>
  </g>
  <!-- centre spot -->
  <circle cx="256" cy="256" r="12" fill="#16b86b" opacity="0.7"/>

  <!-- football, overlapping bottom-right for depth -->
  <g transform="translate(330,330)">
    <circle r="92" fill="url(#ball)"/>
    <circle r="92" fill="none" stroke="#022" stroke-width="6" opacity="0.25"/>
    <!-- simple pentagon pattern -->
    <g fill="#06324a">
      <polygon points="0,-34 32,-11 20,27 -20,27 -32,-11"/>
    </g>
    <g stroke="#06324a" stroke-width="7" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-34" x2="0" y2="-70"/>
      <line x1="32" y1="-11" x2="64" y2="-22"/>
      <line x1="20" y1="27" x2="40" y2="58"/>
      <line x1="-20" y1="27" x2="-40" y2="58"/>
      <line x1="-32" y1="-11" x2="-64" y2="-22"/>
    </g>
  </g>
</svg>
